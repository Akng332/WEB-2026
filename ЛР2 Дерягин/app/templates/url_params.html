{% extends "base.html" %}
{% block content %}
<h2>Параметры URL</h2>
{% if params %}
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Параметр</th>
                <th>Значение</th>
            </tr>
        </thead>
        <tbody>
            {% for key, value in params.items() %}
            <tr>
                <td>{{ key }}</td>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <div class="alert alert-info">
        Нет параметров URL. Добавьте параметры в адресную строку, например: <code>?name=John&age=25</code>
    </div>
{% endif %}
{% endblock %}
