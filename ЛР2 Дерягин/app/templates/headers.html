{% extends "base.html" %}
{% block content %}
<h2>Заголовки запроса</h2>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Заголовок</th>
            <th>Значение</th>
        </tr>
    </thead>
    <tbody>
        {% for key, value in headers.items() %}
        <tr>
            <td>{{ key }}</td>
            <td>{{ value }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
